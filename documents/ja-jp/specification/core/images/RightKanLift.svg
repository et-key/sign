<svg width="350" height="260" viewBox="0 0 350 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .cat-node { fill: #f8fafc; stroke: #475569; stroke-width: 2px; }
    .cat-text { font-family: 'Outfit', 'Inter', sans-serif; font-weight: bold; font-size: 16px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .func-arrow { stroke: #64748b; stroke-width: 1.5px; }
    .func-text { font-family: 'Inter', sans-serif; font-size: 13px; fill: #334155; }
    .ext-arrow { stroke: #2563eb; stroke-width: 2.5px; }
    .ext-text { font-family: 'Inter', sans-serif; font-weight: bold; font-size: 13px; fill: #1d4ed8; }
    .trans-arrow { stroke: #d97706; stroke-width: 2px; }
    .trans-text { font-family: 'Inter', sans-serif; font-weight: bold; font-size: 14px; fill: #b45309; }
  </style>

  <!-- Markers -->
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-double" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Category Nodes -->
  <circle cx="60" cy="130" r="20" class="cat-node" />
  <text x="60" y="131" class="cat-text">A</text>

  <circle cx="280" cy="50" r="20" class="cat-node" />
  <text x="280" y="51" class="cat-text">B</text>

  <circle cx="280" cy="210" r="20" class="cat-node" />
  <text x="280" y="211" class="cat-text">C</text>

  <!-- Functor Arrows -->
  <!-- p: B -> C -->
  <line x1="280" y1="75" x2="280" y2="185" class="func-arrow" marker-end="url(#arrow-gray)" />
  <text x="295" y="135" class="func-text">p</text>

  <!-- F: A -> C -->
  <line x1="80" y1="138" x2="255" y2="203" class="func-arrow" marker-end="url(#arrow-gray)" />
  <text x="160" y="190" class="func-text">F</text>

  <!-- Rlift_p F: A -> B -->
  <line x1="80" y1="122" x2="255" y2="57" class="ext-arrow" marker-end="url(#arrow-blue)" />
  <text x="150" y="75" class="ext-text">Rlift_p F</text>

  <!-- Natural Transformation 2-cell (ε: p o Rlift_p F => F) -->
  <line x1="170" y1="105" x2="170" y2="155" class="trans-arrow" marker-end="url(#arrow-double)" stroke-dasharray="4 3" />
  <text x="180" y="135" class="trans-text">ε</text>
</svg>