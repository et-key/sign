<svg width="350" height="260" viewBox="0 0 350 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .cat-node { fill: #f8fafc; stroke: #475569; stroke-width: 2px; }
    .cat-text { font-family: 'Outfit', 'Inter', sans-serif; font-weight: bold; font-size: 16px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .func-arrow { stroke: #64748b; stroke-width: 1.5px; }
    .func-text { font-family: 'Inter', sans-serif; font-size: 13px; fill: #334155; }
    .ext-arrow { stroke: #16a34a; stroke-width: 2.5px; }
    .ext-text { font-family: 'Inter', sans-serif; font-weight: bold; font-size: 13px; fill: #15803d; }
    .trans-arrow { stroke: #d97706; stroke-width: 2px; }
    .trans-text { font-family: 'Inter', sans-serif; font-weight: bold; font-size: 14px; fill: #b45309; }
  </style>

  <!-- Markers -->
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-double" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Category Nodes -->
  <circle cx="60" cy="50" r="20" class="cat-node" />
  <text x="60" y="51" class="cat-text">A</text>

  <circle cx="60" cy="210" r="20" class="cat-node" />
  <text x="60" y="211" class="cat-text">B</text>

  <circle cx="280" cy="130" r="20" class="cat-node" />
  <text x="280" y="131" class="cat-text">C</text>

  <!-- Functor Arrows -->
  <!-- K: A -> B -->
  <line x1="60" y1="75" x2="60" y2="185" class="func-arrow" marker-end="url(#arrow-gray)" />
  <text x="40" y="135" class="func-text">K</text>

  <!-- F: A -> C -->
  <line x1="80" y1="57" x2="255" y2="122" class="func-arrow" marker-end="url(#arrow-gray)" />
  <text x="170" y="75" class="func-text">F</text>

  <!-- Lan_K F: B -> C -->
  <line x1="80" y1="203" x2="255" y2="138" class="ext-arrow" marker-end="url(#arrow-green)" />
  <text x="160" y="190" class="ext-text">Lan_K F</text>

  <!-- Natural Transformation 2-cell (η: F => Lan_K F o K) -->
  <line x1="170" y1="105" x2="120" y2="135" class="trans-arrow" marker-end="url(#arrow-double)" stroke-dasharray="4 3" />
  <text x="155" y="135" class="trans-text">η</text>
</svg>