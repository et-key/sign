<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>Sign WASM Playground</title>
	<script src="https://unpkg.com/wabt@1.0.32/index.js"></script>
	<style>
		body {
			font-family: monospace;
			display: flex;
			flex-direction: column;
			padding: 20px;
			background: #fafafa;
		}

		.top-panels {
			display: flex;
			gap: 20px;
			margin-bottom: 10px;
		}

		.input-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
		}

		textarea {
			height: 100px;
			font-family: monospace;
			font-size: 16px;
			padding: 10px;
			border-radius: 5px;
			border: 1px solid #ccc;
		}

		.panels {
			display: flex;
			gap: 20px;
			margin-top: 10px;
		}

		.panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
		}

		pre {
			background: #1e1e1e;
			color: #d4d4d4;
			padding: 15px;
			overflow-x: auto;
			flex-grow: 1;
			border-radius: 5px;
			font-size: 14px;
		}

		button {
			padding: 10px 20px;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
			background: #007acc;
			color: white;
			border: none;
			border-radius: 5px;
			align-self: flex-start;
		}

		button:hover {
			background: #005999;
		}
	</style>
</head>

<body>

	<h2>Sign → WebAssembly Playground (f64)</h2>

	<div class="top-panels">
		<div class="input-panel">
			<label><strong>Sign Code:</strong></label>
			<textarea id="codeInput"></textarea>
		</div>
		<div class="input-panel">
			<label><strong>Standard Input:</strong></label>
			<textarea id="stdInput"></textarea>
		</div>
	</div>

	<button id="runBtn">Compile & Run WASM</button>

	<div class="panels">
		<div class="panel">
			<h3>Generated WAT</h3>
			<pre id="watOutput"></pre>
		</div>
		<div class="panel">
			<h3>Execution Output</h3>
			<pre id="consoleOutput"></pre>
		</div>
	</div>

	<script type="module">
		import { parseSign } from './parser_browser.js';
		import { compileToWat } from './compiler_wat.js';

		document.getElementById('runBtn').addEventListener('click', async () => {
			const code = document.getElementById('codeInput').value;
			const stdinText = document.getElementById('stdInput').value;
			const outputEl = document.getElementById('consoleOutput');
			outputEl.textContent = '';

			try {
				// 1. 標準入力をパースして配列（キュー）にする
				const inputQueue = stdinText.split(/\s+/)
					.filter(x => x !== '')
					.map(x => parseFloat(x) || 0.0);
				let inputPointer = 0;

				// 2. Signコードの構文解析
				const ast = parseSign(code);

				// 3. WATの生成
				const watCode = compileToWat(ast);
				document.getElementById('watOutput').textContent = watCode;

				// 4. WABTによるバイナリコンパイル
				const wabt = await WabtModule();
				const module = wabt.parseWat('test.wat', watCode);
				module.resolveNames();
				module.validate();
				const { buffer } = module.toBinary({ log: true });

				// 5. WASMインポート環境
				let wasmMemory;
				const importObject = {
					env: {
						math_fmod: (a, b) => a % b,
						math_pow: Math.pow,

						// ==========================================
						// ★ AArch64 OSカーネル相当の統合システムコール
						// ==========================================
						syscall: (sys_num, arg) => {
							if (!wasmMemory) return Number.NaN;

							// --- sys_read (63): 標準入力 ---
							if (sys_num === 63) {
								if (inputPointer < inputQueue.length) {
									return inputQueue[inputPointer++];
								}
								return 0.0;
							}

							// --- sys_write (64): 標準出力 ---
							if (sys_num === 64) {
								const buf = new ArrayBuffer(8);
								new Float64Array(buf)[0] = arg;
								const view = new DataView(buf);
								const tag = view.getUint32(4, true) & 0xFFFF0000;
								const ptr = view.getUint32(0, true);

								const memView = new DataView(wasmMemory.buffer);

								// 1. 文字列出力 (0x7FFD, 0x7FF5)
								if (tag === 0x7FFD0000 || tag === 0x7FF50000) {
									let len = 0;
									// C言語ライクにNull終端(\0)まで読む
									while (new Uint8Array(wasmMemory.buffer, ptr + len, 1)[0] !== 0) len++;
									const bytes = new Uint8Array(wasmMemory.buffer, ptr, len);
									const str = new TextDecoder('utf-8').decode(bytes);
									outputEl.textContent += `[Print] ${str}\n`;
									return arg;
								}

								// 2. クロージャ出力 (0x7FFE)
								if (tag === 0x7FFE0000) {
									outputEl.textContent += `[Print] <Closure (Ptr: ${ptr})>\n`;
									return arg;
								}

								// 3. リスト出力 (0x7FFC, 0x7FF4) - デュアル表示
								if (tag === 0x7FFC0000 || tag === 0x7FF40000) {
									function readRaw(f64_val) {
										const b = new ArrayBuffer(8);
										new Float64Array(b)[0] = f64_val;
										const v = new DataView(b);
										const t = v.getUint32(4, true) & 0xFFFF0000;
										const p = v.getUint32(0, true);
										if (t === 0x7FFC0000 || t === 0x7FF40000) return traverseRaw(p);
										if (t === 0x7FF80000) return "()";
										if (t === 0x7FFE0000) return "<Closure>";
										return f64_val.toString();
									}
									// --- 1. Raw表示 (Signのドットペア) 用のパース ---
									function traverseRaw(p) {
										if (p === 0) return "()";
										const car_val = memView.getFloat64(p, true);
										const cdr_val = memView.getFloat64(p + 8, true);
										// ★ 修正: Lispの `.` ではなく Signの `,` を使う
										return `(${readRaw(car_val)} , ${readRaw(cdr_val)})`;
									}
									function readPretty(f64_val) {
										const b = new ArrayBuffer(8);
										new Float64Array(b)[0] = f64_val;
										const v = new DataView(b);
										const t = v.getUint32(4, true) & 0xFFFF0000;
										const p = v.getUint32(0, true);
										if (t === 0x7FFC0000 || t === 0x7FF40000) return formatPretty(p);
										if (t === 0x7FF80000) return "()";
										if (t === 0x7FFE0000) return "<Closure>";
										return f64_val.toString();
									}
									// --- 2. 綺麗に整形した配列表示用のパース ---
									function formatPretty(p) {
										if (p === 0) return "[]";
										let res = "[";
										let current = p;
										while (current !== 0) {
											const car_val = memView.getFloat64(current, true);
											const cdr_val = memView.getFloat64(current + 8, true);

											res += readPretty(car_val);

											const cdr_buf = new ArrayBuffer(8);
											new Float64Array(cdr_buf)[0] = cdr_val;
											const cdr_view = new DataView(cdr_buf);
											const cdr_tag = cdr_view.getUint32(4, true) & 0xFFFF0000;

											if (cdr_tag === 0x7FF80000) {
												break; // Unitなら正常な終端
											} else if (cdr_tag === 0x7FFC0000 || cdr_tag === 0x7FF40000) {
												res += ", "; // 次の要素へ
												current = cdr_view.getUint32(0, true);
											} else {
												// ★ 修正: 不正なドットペアの末尾も `|` ではなく `,` で繋ぐ
												res += ", " + readPretty(cdr_val);
												break;
											}
										}
										res += "]";
										return res;
									}
									outputEl.textContent += `[Print] ${formatPretty(ptr)}  // Raw: ${traverseRaw(ptr)}\n`;
									return arg;
								}

								// 4. 通常の数値
								outputEl.textContent += `[Print] ${arg}\n`;
								return arg;
							}

							return Number.NaN;
						}
					}
				};

				// 6. 実行
				const wasmInstance = await WebAssembly.instantiate(buffer, importObject);
				wasmMemory = wasmInstance.instance.exports.memory;
				const result = wasmInstance.instance.exports.main();

				outputEl.textContent += `\n[Main Result] ${result}\n`;

			} catch (err) {
				outputEl.textContent = `Error: ${err.message}`;
				console.error(err);
			}
		});
	</script>
</body>

</html>
